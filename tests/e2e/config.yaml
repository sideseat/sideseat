# SideSeat E2E Test Configuration
# Enable/disable test suites by setting them to true/false

tests:
  otel:
    # Health and infrastructure tests
    health: true

    # Synthetic trace ingestion and verification
    synthetic: true

    # Strands SDK trace generation and verification
    strands: true

    # Trace API tests (listing, filtering, pagination)
    traces: true

    # Span API tests (listing, filtering)
    spans: true

    # Data integrity tests (framework detection, token usage, etc.)
    integrity: true

    # Performance tests (~200MB data ingestion and query benchmarks)
    performance: true

    # SSE (Server-Sent Events) real-time streaming tests
    sse: true

    # Performance test settings
    performance_settings:
      # Target data size in MB
      target_size_mb: 200

      # Batch size (spans per OTLP request)
      batch_size: 100

      # Average spans per trace
      spans_per_trace: 20

    # Query performance thresholds in seconds
    thresholds:
      trace_list: 1.0
      trace_single: 0.5
      span_list: 1.0
      span_filter: 1.5
      pagination_per_page: 0.5

    # Wait time for traces to persist (seconds)
    trace_persist_wait: 10
