# SideSeat E2E Test Configuration
# Enable/disable test phases by setting them to true/false

tests:
  otlp:
    # Smoke tests - quick validation (~30 seconds)
    smoke: true

    # Functional tests - comprehensive feature verification (~5 minutes)
    functional: true

    # Performance tests - load and query benchmarks (~10 minutes)
    performance: true

# Global test settings
settings:
  # Wait time for traces to persist (seconds)
  trace_persist_wait: 3

  # Default timeout for API calls (seconds)
  api_timeout: 30

  # Default timeout for SSE connections (seconds)
  sse_timeout: 10

  # Performance test settings
  performance:
    # Number of traces for throughput tests
    throughput_trace_count: 100

    # Duration for sustained load test (seconds)
    sustained_load_duration: 30

    # Concurrent workers for load tests
    concurrent_workers: 10

  # Query performance thresholds (milliseconds)
  thresholds:
    trace_list_avg_ms: 500
    trace_detail_avg_ms: 200
    span_list_avg_ms: 300
    filtered_query_avg_ms: 500
    large_result_max_ms: 2000
