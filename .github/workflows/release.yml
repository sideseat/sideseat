name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            name: sideseat-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: sideseat-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: sideseat-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: sideseat-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: sideseat-win32-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.10'

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install frontend deps
        run: cd web && npm install

      - name: Build frontend
        run: cd web && npm run build

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/sideseat.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/sideseat ${{ matrix.name }}
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  publish-npm:
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.10'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: cli/bin/

      - name: Move binaries to correct location
        run: |
          mkdir -p cli/bin
          find cli/bin -type f -name 'sideseat-*' -exec mv {} cli/bin/ \;
          ls -la cli/bin/

      - name: Make binaries executable
        run: chmod +x cli/bin/sideseat-* || true

      - name: Test CLI package
        run: |
          cd cli
          npm pack
          tar -tzf *.tgz | grep bin/

      - name: Publish to NPM
        run: |
          cd cli
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
